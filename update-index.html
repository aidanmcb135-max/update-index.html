<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to £3m Hit List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f1;
    --surface: #ffffff;
    --surface2: #f2efe8;
    --ink: #1a1a18;
    --ink2: #5a5a55;
    --ink3: #9a9a92;
    --accent: #2d6a4f;
    --accent2: #52b788;
    --win: #2d6a4f;
    --win-bg: #d8f3dc;
    --reached: #1d6991;
    --reached-bg: #d0eaf7;
    --target: #7b4f12;
    --target-bg: #fde8c0;
    --rejected: #7a2626;
    --rejected-bg: #fde0e0;
    --other: #44444a;
    --other-bg: #e8e8ec;
    --border: #e2ddd5;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    --radius: 10px;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
 
  /* ── Header ── */
  header {
    background: var(--ink);
    color: #fff;
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent2);
  }
  header .title-group { flex: 1; }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    letter-spacing: -0.3px;
    line-height: 1.1;
    color: #fff;
  }
  header h1 em { color: var(--accent2); font-style: normal; }
  header .subtitle { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  header .stats {
    display: flex; gap: 20px;
    font-size: 12px; color: rgba(255,255,255,0.55);
    align-items: center;
  }
  header .stats strong { font-size: 20px; color: var(--accent2); font-family: 'DM Serif Display', serif; display: block; }
 
  /* ── Layout ── */
  .shell { display: flex; min-height: calc(100vh - 79px); }
 
  /* ── Sidebar ── */
  aside {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 79px;
    height: calc(100vh - 79px);
    overflow-y: auto;
  }
  .nav-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink3);
    padding: 0 20px 8px;
    font-weight: 600;
  }
  .search-wrap { padding: 0 16px 16px; }
  .search-wrap input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface2);
    color: var(--ink);
    outline: none;
    transition: border 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent2); background: #fff; }
 
  nav a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 20px;
    font-size: 13px;
    color: var(--ink2);
    text-decoration: none;
    border-left: 3px solid transparent;
    transition: all 0.12s;
    cursor: pointer;
    gap: 8px;
  }
  nav a:hover { background: var(--surface2); color: var(--ink); }
  nav a.active { background: #edf7f1; color: var(--win); border-left-color: var(--accent2); font-weight: 600; }
  nav a .sector-name { flex: 1; }
  nav a .count {
    font-size: 11px;
    background: var(--surface2);
    color: var(--ink3);
    border-radius: 20px;
    padding: 1px 7px;
    font-weight: 500;
  }
  nav a.active .count { background: var(--win-bg); color: var(--win); }
 
  /* ── Main ── */
  main { flex: 1; padding: 32px 36px; overflow-x: hidden; }
 
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
 
  .section-header { margin-bottom: 24px; }
  .section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .section-header p { color: var(--ink3); font-size: 13px; }
 
  /* ── Status pills ── */
  .pill {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 2px 9px;
    border-radius: 20px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .pill-win { background: var(--win-bg); color: var(--win); }
  .pill-reached { background: var(--reached-bg); color: var(--reached); }
  .pill-target { background: var(--target-bg); color: var(--target); }
  .pill-rejected { background: var(--rejected-bg); color: var(--rejected); }
  .pill-other { background: var(--other-bg); color: var(--other); }
 
  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar span { font-size: 12px; color: var(--ink3); margin-right: 4px; }
  .filter-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 20px;
    padding: 4px 13px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink2);
    transition: all 0.12s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent2); background: #edf7f1; color: var(--win); }
  .filter-btn.active { font-weight: 600; }
 
  /* ── Entry list ── */
  .entry-list { display: flex; flex-direction: column; gap: 10px; }
  
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .entry:hover { box-shadow: var(--shadow); }
 
  .entry-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 18px;
    cursor: pointer;
    user-select: none;
  }
  .entry-name {
    flex: 1;
    font-weight: 500;
    font-size: 13.5px;
    color: var(--ink);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-meta { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .entry-lead {
    font-size: 11px;
    color: var(--ink3);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .expand-icon { color: var(--ink3); font-size: 10px; flex-shrink: 0; transition: transform 0.15s; }
  .entry.open .expand-icon { transform: rotate(90deg); }
 
  .entry-body {
    display: none;
    padding: 0 18px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .entry.open .entry-body { display: block; }
 
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px 20px;
    padding-top: 14px;
  }
  .detail-item label {
    display: block;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink3);
    font-weight: 600;
    margin-bottom: 3px;
  }
  .detail-item .val {
    font-size: 13px;
    color: var(--ink);
    word-break: break-word;
    white-space: pre-line;
    line-height: 1.5;
  }
  .detail-item .val a { color: var(--accent); text-decoration: none; }
  .detail-item .val a:hover { text-decoration: underline; }
  .detail-item.full { grid-column: 1 / -1; }
 
  /* ── Empty state ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--ink3); }
  .empty p { font-size: 15px; margin-top: 8px; }
 
  /* ── Results count ── */
  .results-count { font-size: 12px; color: var(--ink3); margin-bottom: 14px; }
 
  /* ── Responsive ── */
  @media (max-width: 768px) {
    header { padding: 20px; flex-wrap: wrap; }
    header .stats { display: none; }
    main { padding: 20px 16px; }
    aside { width: 180px; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
 
<header>
  <div class="title-group">
    <h1>Road to <em>£3m</em> Hit List</h1>
    <div class="subtitle">NEMI & Trampoline Teas · Sales Pipeline</div>
  </div>
  <div class="stats" id="header-stats"></div>
</header>
 
<div class="shell">
  <aside>
    <div class="search-wrap">
      <input type="text" id="global-search" placeholder="Search all sectors…" autocomplete="off">
    </div>
    <div class="nav-label">Sectors</div>
    <nav id="sidebar-nav"></nav>
  </aside>
 
  <main id="main-content">
      <div class="empty"><p>Fetching the latest leads from the spreadsheet...</p></div>
  </main>
</div>
 
<script>
// UPDATE THESE TWO LINES
const GITHUB_USERNAME = 'aidanmcb135-max';
const REPO_NAME = 'update-index.html';

let DATA = {};
let sectorOrder = [];

// Status normalisation
function statusClass(s) {
  if (!s) return 'other';
  const sl = s.toLowerCase();
  if (sl === 'win' || sl === 'won' || sl === 'customers') return 'win';
  if (sl.includes('reached') || sl.includes('contacted') || sl === 'leads' || sl === 'proposal delivered' || sl === 'meeting scheduled' || sl === 'contacted us') return 'reached';
  if (sl === 'target') return 'target';
  if (sl.includes('reject') || sl === 'lost' || sl === 'cold leads for long term follow up') return 'rejected';
  return 'other';
}
function statusLabel(s) { return s || '—'; }
function pillHtml(s) {
  if (!s) return '';
  const cls = statusClass(s);
  return `<span class="pill pill-${cls}">${statusLabel(s)}</span>`;
}
 
// Auto-detect if value is URL
function autoLink(val) {
  if (!val) return '';
  return val.toString().split('\n').map(line => {
    const trimmed = line.trim();
    if (/^https?:\/\//i.test(trimmed)) return `<a href="${trimmed}" target="_blank" rel="noopener">${trimmed.replace(/^https?:\/\//i,'').slice(0,60)}${trimmed.length > 63 ? '…' : ''}</a>`;
    return escHtml(line);
  }).join('<br>');
}
function escHtml(s) {
  return s.toString().replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
}
 
// Determine if a detail item should be full-width (long text)
function isLongField(label) {
  const l = label.toLowerCase();
  return l.includes('note') || l.includes('pitch') || l.includes('strategy') || l.includes('reason') || l.includes('update') || l.includes('description') || l.includes('trampoline') || l.includes('cp notes') || l.includes('quick');
}
 
// State
let currentSector = null;
let currentFilter = 'all';
let searchQuery = '';
 
// Count totals per sector
function sectorCount(sectorName) { return DATA[sectorName].rows.length; }
function totalEntries() { return sectorOrder.reduce((s,n) => s + sectorCount(n), 0); }
function winCount() {
  let c = 0;
  sectorOrder.forEach(n => {
    DATA[n].rows.forEach(r => { if (statusClass(r.status) === 'win') c++; });
  });
  return c;
}
 
// Build sidebar
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = sectorOrder.map((name, i) => {
    return `<a data-sector="${name}" onclick="selectSector('${name}')" class="${i===0?'active':''}">
      <span class="sector-name">${name}</span>
      <span class="count">${sectorCount(name)}</span>
    </a>`;
  }).join('');
}
 
// Build header stats
function buildStats() {
  const total = totalEntries();
  const wins = winCount();
  document.getElementById('header-stats').innerHTML = `
    <div><strong>${total}</strong>Total Leads</div>
    <div><strong>${wins}</strong>Wins</div>
    <div><strong>${sectorOrder.length}</strong>Sectors</div>
  `;
}
 
// Get available statuses for a sector
function getStatuses(sectorName) {
  const seen = new Set();
  DATA[sectorName].rows.forEach(r => { if (r.status) seen.add(r.status); });
  return [...seen].sort();
}
 
// Render a sector
function renderSector(sectorName) {
  const { headers, rows } = DATA[sectorName];
  const statuses = getStatuses(sectorName);
  const hasStatus = rows.some(r => r.status);
  
  let filterHtml = '';
  if (hasStatus) {
    filterHtml = `<div class="filter-bar">
      <span>Filter:</span>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All <small>(${rows.length})</small></button>
      ${statuses.map(st => {
        const cnt = rows.filter(r => r.status === st).length;
        return `<button class="filter-btn" data-filter="${st}" onclick="setFilter('${st}', this)">${st} <small>(${cnt})</small></button>`;
      }).join('')}
    </div>`;
  }
  
  return `<div class="section active" id="section-${sectorName.replace(/[^a-z0-9]/gi,'_')}">
    <div class="section-header">
      <h2>${sectorName}</h2>
      <p>${rows.length} entries</p>
    </div>
    ${filterHtml}
    <div class="results-count" id="results-count-${sectorName.replace(/[^a-z0-9]/gi,'_')}"></div>
    <div class="entry-list" id="list-${sectorName.replace(/[^a-z0-9]/gi,'_')}"></div>
  </div>`;
}
 
function renderEntries(sectorName) {
  const { headers, rows } = DATA[sectorName];
  const listId = `list-${sectorName.replace(/[^a-z0-9]/gi,'_')}`;
  const countId = `results-count-${sectorName.replace(/[^a-z0-9]/gi,'_')}`;
  const listEl = document.getElementById(listId);
  const countEl = document.getElementById(countId);
  if (!listEl) return;
  
  let filtered = rows;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(r => r.status === currentFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(r => r.cols.some(c => c.toString().toLowerCase().includes(q)));
  }
  
  countEl.textContent = filtered.length === rows.length ? '' : `Showing ${filtered.length} of ${rows.length}`;
  
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty"><p>No entries match the current filters.</p></div>`;
    return;
  }
  
  listEl.innerHTML = filtered.map((row, idx) => {
    const name = row.name || row.cols[0] || '—';
    let leadVal = '';
    headers.forEach((h, i) => {
      if (h.toLowerCase() === 'lead' && row.cols[i]) leadVal = row.cols[i];
    });
    
    const details = headers.map((h, i) => {
      const val = row.cols[i] || '';
      if (!val || !h || h === headers[0] || h.toLowerCase() === 'status') return '';
      const long = isLongField(h);
      return `<div class="detail-item${long ? ' full' : ''}">
        <label>${escHtml(h)}</label>
        <div class="val">${autoLink(val)}</div>
      </div>`;
    }).join('');
    
    const entryId = `entry-${sectorName.replace(/[^a-z0-9]/gi,'_')}-${idx}`;
    
    return `<div class="entry" id="${entryId}">
      <div class="entry-head" onclick="toggleEntry('${entryId}')">
        <span class="entry-name" title="${escHtml(name)}">${escHtml(name)}</span>
        <span class="entry-meta">
          ${leadVal ? `<span class="entry-lead">${escHtml(leadVal)}</span>` : ''}
          ${row.status ? pillHtml(row.status) : ''}
        </span>
        <span class="expand-icon">▶</span>
      </div>
      <div class="entry-body">
        <div class="detail-grid">${details}</div>
      </div>
    </div>`;
  }).join('');
}
 
function toggleEntry(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}
 
function selectSector(name) {
  currentSector = name;
  currentFilter = 'all';
  document.querySelectorAll('#sidebar-nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.sector === name);
  });
  document.getElementById('main-content').innerHTML = renderSector(name);
  renderEntries(name);
}
 
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEntries(currentSector);
}

// FETCH DATA FROM GITHUB
async function init() {
    const url = `https://${GITHUB_USERNAME}.github.io/${REPO_NAME}/data.json`;
    try {
        const response = await fetch(url);
        const rawData = await response.json();
        
        // Convert simplified JSON to the app's structure
        Object.keys(rawData).forEach(sector => {
            const rows = rawData[sector];
            if (rows.length === 0) return;
            
            const headers = Object.keys(rows[0]);
            // Attempt to find status and name columns
            const statusIdx = headers.findIndex(h => h.toLowerCase() === 'status');
            
            DATA[sector] = {
                headers: headers,
                rows: rows.map(r => ({
                    name: r[headers[0]],
                    status: statusIdx !== -1 ? r[headers[statusIdx]] : '',
                    cols: Object.values(r)
                }))
            };
        });

        sectorOrder = Object.keys(DATA);
        buildSidebar();
        buildStats();
        selectSector(sectorOrder[0]);

    } catch (err) {
        console.error("Error loading data:", err);
        document.getElementById('main-content').innerHTML = `<div class="empty"><p>Error loading data. Ensure data.json exists in your repo.</p></div>`;
    }
}
 
document.addEventListener('DOMContentLoaded', () => {
  init();
  document.getElementById('global-search').addEventListener('input', function() {
    searchQuery = this.value.trim();
    if (currentSector) renderEntries(currentSector);
  });
});
</script>
</body>
</html>
